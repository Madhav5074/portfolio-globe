<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Madhav Kalra | Portfolio Globe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1e1e3a 0%, #0f0f1f 100%);
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            touch-action: none;
            font-family: 'Poppins', sans-serif;
        }
        canvas { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
        }
        #info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            font-size: 32px; 
            font-weight: 700;
            background: rgba(0, 0, 0, 0.7); 
            padding: 15px 30px; 
            border-radius: 12px; 
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9); 
            z-index: 10; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; 
            animation: fadeIn 1s ease-in-out;
            backdrop-filter: blur(8px);
        }
        #info.blue-state {
            font-size: 40px;
        }
        #info:hover {
            transform: translateY(-5px) scale(1.05); 
            background: rgba(0, 0, 0, 0.85); 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        #info-note {
            font-size: 16px;
            font-weight: 400;
            color: #e0e0ff;
            margin-top: 8px;
            display: block;
            animation: pulse 2s infinite ease-in-out;
            transition: opacity 0.5s ease;
        }
        #bottom-note {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: #e0e0ff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 12px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            z-index: 10;
            animation: pulse 2s infinite ease-in-out;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }
        #tooltip { 
            position: absolute; 
            background: rgba(0, 0, 0, 0.95); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            font-size: 16px; 
            font-weight: 400;
            padding: 12px 18px; 
            border-radius: 10px; 
            pointer-events: none; 
            z-index: 20; 
            display: none; 
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6); 
            max-width: 220px; 
            word-wrap: break-word; 
            transition: opacity 0.3s ease, transform 0.3s ease;
            animation: tooltipPop 0.3s ease-out;
        }
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(30, 30, 60, 0.9));
            display: none;
            z-index: 30;
            align-items: center;
            justify-content: center;
            animation: fadeInOverlay 0.5s ease-in-out;
            backdrop-filter: blur(5px);
        }
        #modal {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            width: 400px;
            height: auto;
            max-height: 80vh;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            font-family: 'Poppins', sans-serif;
            overflow-y: auto;
            animation: modalPop 0.6s ease-out forwards;
            z-index: 31;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
            transform: none !important;
        }
        #modal h1 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 1.8em;
            font-weight: 800;
        }
        #modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            z-index: 35;
        }
        #back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #800080;
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: none;
            z-index: 25;
            backdrop-filter: blur(8px);
        }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 4px; background: #6b48ff; }
        .timeline .entry { margin-bottom: 25px; position: relative; }
        .timeline .entry::before { content: ''; position: absolute; left: -15px; top: 5px; width: 10px; height: 10px; background: #ffffff; border-radius: 50%; }
        .project-card { background: rgba(255, 255, 255, 0.15); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        #progress-bar { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: rgba(255, 255, 255, 0.2); z-index: 10; }
        #progress-fill { width: 0%; height: 100%; background: #800080; transition: width 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="info"> Madhav Kalra <span id="info-note">Selling with Strategy. Building with Brains.</span> </div>
    <div id="bottom-note">Click a skill to learn more!</div>
    <div id="tooltip"></div>
    <div id="modal-overlay">
        <div id="modal">
            <button id="modal-close">×</button>
            <h1 id="modal-title"></h1>
            <div id="modal-details"></div>
        </div>
    </div>
    <div id="transition-notification"></div>
    <div id="particles"></div>
    <button id="back-button">Back</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
    
    <script>
        // THREE.js Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const isMobile = window.innerWidth < 600;
        const geometry = new THREE.IcosahedronGeometry(isMobile ? 3.2 : 4.5, 1);
        const greyMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, opacity: 0.8 });
        const sphere = new THREE.Mesh(geometry, greyMaterial);
        scene.add(sphere);

        const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
        sphere.add(edges);

        scene.add(new THREE.AmbientLight(0x606060, 1.0));
        const light = new THREE.PointLight(0xffffff, 1.5, 100);
        light.position.set(10, 10, 10);
        scene.add(light);

        camera.position.z = isMobile ? 12 : 11;
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;

        // Skill Data
        const greySkills = [
            { 
                name: "Experience", 
                details: `
                    <div class="timeline">
                        <img src="images/Abclogo.png" alt="ABC logo" style="width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px;">
                        <div class="entry" style="animation: fadeIn 0.5s ease-in-out;">
                            <p><strong>Management Trainee</strong><br>Aditya Birla Capital (Jul 2025 - Present)<br><span style="font-size:0.9em; opacity:0.8">Currently driving strategic business initiatives and customer growth strategies.</span></p>
                        </div>
                        <img src="images/rkfc50.png" alt="RKFC logo" style="width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px;">
                        <div class="entry" style="animation: fadeIn 0.7s ease-in-out;">
                            <p><strong>Finance Accounting Intern</strong><br>Radha Krishna Fruit Company (May 2024 - Jul 2024)</p>
                        </div>
                        <img src="images/googlelogo.png" alt="Google logo" style="width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px;">
                        <div class="entry" style="animation: fadeIn 0.9s ease-in-out;">
                            <p><strong>Google Play Developer</strong><br>Freelance (Apr 2022 - Nov 2023)</p>
                        </div>
                    </div>
                ` 
            },
            { name: "Education", details: "PGDM from Delhi School of Business & B.Com from Delhi University." },
            { name: "skills", details: "Click to explore technical & marketing skills" },
            { name: "About Me", details: "Click to explore contact information" },
            { name: "Projects", details: "Check out Formality.in and other 3D web projects." },
            { name: "Responsibilities", details: "Coordinator at INVICTUS Data Club & Technical Head." }
        ];

        // Font & Text Mesh Logic (Simplified for brevity)
        let font;
        const textMeshes = [];
        const loader = new THREE.FontLoader();
        loader.load('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/fonts/helvetiker_bold.typeface.json', (f) => {
            font = f;
            updateTextMeshes();
        });

        function updateTextMeshes() {
            textMeshes.forEach(m => sphere.remove(m));
            textMeshes.length = 0;
            greySkills.forEach((skill, i) => {
                const textGeo = new THREE.TextGeometry(skill.name, { font: font, size: isMobile ? 0.25 : 0.4, height: 0.05 });
                const textMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const mesh = new THREE.Mesh(textGeo, textMat);
                
                // Position logic based on sphere vertices
                const phi = Math.acos(-1 + (2 * i) / greySkills.length);
                const theta = Math.sqrt(greySkills.length * Math.PI) * phi;
                mesh.position.setFromSphericalCoords(isMobile ? 4 : 5.5, phi, theta);
                mesh.lookAt(0,0,0);
                mesh.rotateY(Math.PI);
                
                mesh.userData = { skill };
                sphere.add(mesh);
                textMeshes.push(mesh);
            });
        }

        // Interaction Logic
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(textMeshes);
            if (intersects.length > 0) {
                const skill = intersects[0].object.userData.skill;
                document.getElementById('modal-title').textContent = skill.name;
                document.getElementById('modal-details').innerHTML = skill.details;
                document.getElementById('modal-overlay').style.display = 'flex';
                controls.autoRotate = false;
            }
        });

        document.getElementById('modal-close').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'none';
            controls.autoRotate = true;
        };

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
